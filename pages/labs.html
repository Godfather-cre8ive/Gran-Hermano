<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratories — Gran Hermano Academy</title>
  <link rel="icon" href="https://www.granhermano.sch.ng/img/logo.png" type="image/png">
  <link rel="stylesheet" href="../css/style.css"><link rel="stylesheet" href="../css/pages.css">
</head>
<body>
<div class="topbar" id="topbar"></div>
<nav id="main-navbar"></nav>
<section class="page-hero">
  <div class="container">
    <h1>Our Laboratories</h1>
    <div class="breadcrumb"><a href="../index.html">Home</a><span>›</span><span>Laboratories</span></div>
  </div>
</section>
<section class="page-content">
  <div class="container">
    <div style="margin-bottom:3rem;text-align:center">
      <span class="section-label">Science Facilities</span>
      <h2 class="section-title">State-of-the-Art Laboratories</h2>
      <div class="gold-line gold-line--center"></div>
    </div>
    <div id="labs-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:2rem"></div>
  </div>
</section>
<section class="join-section">
  <div class="container">
    <h2>Would You Like to Know More?</h2>
    <p>Contact us today or apply for admission online.</p>
    <a href="apply.html" class="btn btn--gold">Apply for Admission</a>
  </div>
</section>
<footer id="main-footer"></footer>
<button class="back-top" id="back-top">↑</button>
<script src="../js/data.js"></script><script src="../js/layout.js"></script>
</body>
</html><script>
document.addEventListener('DOMContentLoaded', () => {
  const all = GHA_DATA.facilities.filter(f => ['ICT','Biology','Physics','Chemistry'].some(k => f.title.includes(k)));
  const use = all.length ? all : GHA_DATA.facilities.slice(2,6);
  document.getElementById('labs-grid').innerHTML = use.map(f =>
    `<div class="why-card"><img class="why-card-img" src="${f.image}" alt="${f.title}" loading="lazy"><div class="why-card-body"><h4>${f.title}</h4><p>${f.description}</p></div></div>`
  ).join('');
});
</script>
